version: '3.9'

services:
  frontend:
    image: mohammadziya1/frontend-image
    restart: always
    # ports:
    #   - "4000:80"

  backend:
    image: mohammadziya1/backend-image
    depends_on:
      - mongo
    env_file:
      - ./backend/.env
    restart: always
    # ports:
    #   - "8000:5000"

  mongo:
    image: mongo
    restart: always
    volumes: 
     - mongo-data:/data/db

  nginx:
    image: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend


volumes: 
  mongo-data:
     
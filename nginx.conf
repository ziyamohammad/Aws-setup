server {
    listen 80;

    resolver 127.0.0.11;

    location /api/ {
        proxy_pass http://backend:5000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        proxy_pass http://frontend:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_http_version 1.1;
    }
}